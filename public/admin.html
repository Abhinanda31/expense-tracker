<!DOCTYPE html>
<html>

<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="admin-topbar">

            <div>

                <h1>👑 Expense Tracker Admin Portal</h1>

                <p id="adminInfo">
                    Logged in as Admin
                </p>

            </div>

            <button onclick="window.location.href='/dashboard.html'" class="admin-btn">

                Back to Dashboard

            </button>

        </div>
        <div class="stats-grid">

            <div class="stat-card">
                <h3>Total Expenses</h3>
                <h2 id="systemTotal">₹0</h2>
            </div>

            <div class="stat-card">
                <h3>Total Users</h3>
                <h2 id="totalUsers">0</h2>
            </div>

            <div class="stat-card">
                <h3>Total Records</h3>
                <h2 id="totalRecords">0</h2>
            </div>

        </div>

        <div class="card">

            <h2>Expense Records</h2>

            <table id="expenseTable">

                <thead>

                    <tr>
                        <th>User</th>
                        <th>Email</th>
                        <th>Category</th>
                        <th>Amount</th>
                        <th>Note</th>
                    </tr>

                </thead>

                <tbody id="expenseBody">

                </tbody>

            </table>

        </div>

    </div>

    <script>

        async function loadAllExpenses() {

            const token =
                localStorage.getItem("token");

            const adminName =
                localStorage.getItem("name");

            document
                .getElementById("adminInfo")
                .textContent =
                "Logged in as: " +
                (adminName || "Admin") +
                " (Admin)";

            const response =
                await fetch(
                    "/api/admin/expenses",
                    {
                        headers: {
                            Authorization: token
                        }
                    }
                );

            const expenses =
                await response.json();

            let totalAmount = 0;

            const users =
                new Set();

            const tbody =
                document.getElementById(
                    "expenseBody"
                );

            tbody.innerHTML = "";

            expenses.forEach((expense) => {

                totalAmount +=
                    Number(expense.amount);

                users.add(
                    expense.user.email
                );

                const row =
                    document.createElement("tr");

                row.innerHTML = `
            <td>${expense.user.name}</td>
            <td>${expense.user.email}</td>
            <td>${expense.category}</td>
            <td>₹${expense.amount}</td>
            <td>${expense.note}</td>
        `;

                tbody.appendChild(row);

            });

            document
                .getElementById(
                    "systemTotal"
                )
                .textContent =
                "₹" + totalAmount;

            document
                .getElementById(
                    "totalUsers"
                )
                .textContent =
                users.size;

            document
                .getElementById(
                    "totalRecords"
                )
                .textContent =
                expenses.length;

        }
        loadAllExpenses();

    </script>

</body>

</html>
