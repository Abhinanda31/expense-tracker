<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Expense Dashboard</h1>

    <button id="logoutBtn">
        Logout
    </button>

    <br><br>

    <h2>Add Expense</h2>

    <form id="expenseForm">

        <input type="number" id="amount" placeholder="Amount" required>

        <br><br>

        <input type="text" id="category" placeholder="Category" required>

        <br><br>

        <input type="date" id="date" required>

        <br><br>

        <input type="text" id="note" placeholder="Note">

        <br><br>

        <button type="submit">
            Add Expense
        </button>

    </form>

    <hr>

    <h2>Total Expenses</h2>

    <p id="totalExpenses">
        Loading...
    </p>

    <h2>Category Summary</h2>

    <ul id="categoryList"></ul>

    <h2>All Expenses</h2>

    <ul id="expenseList"></ul>

    <script>

        async function loadDashboard() {

            const token =
                localStorage.getItem("token");

            if (!token) {

                alert("Please login first");

                window.location.href =
                    "/login.html";

                return;
            }

            try {

                const response =
                    await fetch(
                        "/api/expenses/dashboard",
                        {
                            headers: {
                                Authorization: token
                            }
                        }
                    );

                const data =
                    await response.json();

                const expenseResponse =
                    await fetch(
                        "/api/expenses",
                        {
                            headers: {
                                Authorization: token
                            }
                        }
                    );

                const expenses =
                    await expenseResponse.json();

                document
                    .getElementById("totalExpenses")
                    .textContent =
                    "₹" + data.totalExpenses;

                const categoryList =
                    document.getElementById("categoryList");

                categoryList.innerHTML = "";

                for (const category in data.byCategory) {

                    const li =
                        document.createElement("li");

                    li.textContent =
                        category +
                        ": ₹" +
                        data.byCategory[category];

                    categoryList.appendChild(li);
                }

                const expenseList =
                    document.getElementById("expenseList");

                expenseList.innerHTML = "";

                expenses.forEach((expense) => {

                    const li =
                        document.createElement("li");

                    li.innerHTML = `
                        ${expense.category}
                        - ₹${expense.amount}
                        - ${expense.note}

                        <button onclick="editExpense('${expense._id}')">
                            Edit
                        </button>

                        <button onclick="deleteExpense('${expense._id}')">
                            Delete
                        </button>
                    `;

                    expenseList.appendChild(li);

                });

            } catch (error) {

                alert("Failed to load dashboard");

            }

        }

        document
            .getElementById("expenseForm")
            .addEventListener("submit", async (event) => {

                event.preventDefault();

                const token =
                    localStorage.getItem("token");

                const amount =
                    document.getElementById("amount").value;

                const category =
                    document.getElementById("category").value;

                const date =
                    document.getElementById("date").value;

                const note =
                    document.getElementById("note").value;

                const response =
                    await fetch(
                        "/api/expenses",
                        {
                            method: "POST",

                            headers: {
                                "Content-Type": "application/json",
                                Authorization: token
                            },

                            body: JSON.stringify({
                                amount,
                                category,
                                date,
                                note
                            })
                        }
                    );

                const data =
                    await response.json();

                alert(data.message);

                document
                    .getElementById("expenseForm")
                    .reset();

                loadDashboard();

            });

        document
            .getElementById("logoutBtn")
            .addEventListener("click", () => {

                localStorage.removeItem("token");

                window.location.href =
                    "/login.html";

            });

        async function editExpense(id) {

            const token =
                localStorage.getItem("token");

            const amount =
                prompt("Enter new amount");

            if (!amount) {
                return;
            }

            const response =
                await fetch(
                    "/api/expenses/" + id,
                    {
                        method: "PUT",

                        headers: {
                            "Content-Type": "application/json",
                            Authorization: token
                        },

                        body: JSON.stringify({
                            amount: Number(amount),
                            category: "Updated Category",
                            date: "2026-06-10",
                            note: "Edited Expense"
                        })
                    }
                );

            const data =
                await response.json();

            alert(data.message);

            loadDashboard();

        }

        async function deleteExpense(id) {

            const token =
                localStorage.getItem("token");

            const response =
                await fetch(
                    "/api/expenses/" + id,
                    {
                        method: "DELETE",

                        headers: {
                            Authorization: token
                        }
                    }
                );

            const data =
                await response.json();

            alert(data.message);

            loadDashboard();

        }

        loadDashboard();

    </script>

</body>

</html>
