<!DOCTYPE html>
<html>

<head>
    <title>Expense Tracker Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="header">

            <h1>💰 Expense Tracker</h1>

            <div>

                <button id="adminBtn" class="admin-btn">
                    Admin Panel
                </button>

                <button id="logoutBtn" class="logout-btn">
                    Logout
                </button>

            </div>

        </div>

        <div class="card total-card">

            <h3>Total Expenses</h3>

            <h2 id="totalExpenses">
                ₹0
            </h2>

        </div>

        <div class="card">

            <h2>Add Expense</h2>

            <form id="expenseForm">

                <input type="number" id="amount" placeholder="Amount" required>

                <input type="text" id="category" placeholder="Category" required>

                <input type="date" id="date" required>

                <input type="text" id="note" placeholder="Note">

                <br><br>

                <button type="submit" class="submit-btn">
                    Add Expense
                </button>

            </form>

        </div>

        <div class="card">

            <h2>Category Summary</h2>

            <ul id="categoryList"></ul>

        </div>

        <div class="card">

            <h2>All Expenses</h2>

            <ul id="expenseList"></ul>

        </div>

    </div>

    <script>

        async function loadDashboard() {

            const token =
                localStorage.getItem("token");

            if (!token) {

                window.location.href =
                    "/login.html";

                return;
            }

            try {

                const response =
                    await fetch(
                        "/api/expenses/dashboard",
                        {
                            headers: {
                                Authorization: `Bearer ${token}`
                            }
                        }
                    );

                const data =
                    await response.json();

                const expenseResponse =
                    await fetch(
                        "/api/expenses",
                        {
                            headers: {
                                Authorization: `Bearer ${token}`
                            }
                        }
                    );

                const expenses =
                    await expenseResponse.json();

                document
                    .getElementById(
                        "totalExpenses"
                    )
                    .textContent =
                    "₹" +
                    data.totalExpenses;

                const categoryList =
                    document.getElementById(
                        "categoryList"
                    );

                categoryList.innerHTML = "";

                for (const category in data.byCategory) {

                    const li =
                        document.createElement("li");

                    li.innerHTML =
                        `<strong>${category}</strong> : ₹${data.byCategory[category]}`;

                    categoryList.appendChild(li);

                }

                const expenseList =
                    document.getElementById(
                        "expenseList"
                    );

                expenseList.innerHTML = "";

                expenses.forEach((expense) => {

                    const li =
                        document.createElement("li");

                    li.innerHTML = `
    <strong>${expense.category}</strong>
    <br>
    Amount: ₹${expense.amount}
    <br>
    Note: ${expense.note}
    <br><br>

    <button
        class="edit-btn"
        onclick="editExpense('${expense._id}')">
        Edit
    </button>

    <button
        class="delete-btn"
        onclick="deleteExpense('${expense._id}')">
        Delete
    </button>
`;

                    expenseList.appendChild(li);

                });

            } catch (error) {

                alert(
                    "Failed to load dashboard"
                );

            }

        }

        document
            .getElementById("expenseForm")
            .addEventListener(
                "submit",
                async (event) => {

                    event.preventDefault();

                    const token =
                        localStorage.getItem("token");

                    const amount =
                        document.getElementById("amount").value;

                    const category =
                        document.getElementById("category").value;

                    const date =
                        document.getElementById("date").value;

                    const note =
                        document.getElementById("note").value;

                    const response =
                        await fetch(
                            "/api/expenses",
                            {
                                method: "POST",

                                headers: {
                                    "Content-Type": "application/json",
                                    Authorization: `Bearer ${token}`
                                },

                                body: JSON.stringify({
                                    amount,
                                    category,
                                    date,
                                    note
                                })
                            }
                        );

                    const data =
                        await response.json();

                    alert(data.message);

                    document
                        .getElementById("expenseForm")
                        .reset();

                    loadDashboard();

                });

        async function editExpense(id) {

            const amount =
                prompt("Enter new amount");

            const category =
                prompt("Enter new category");

            const date =
                prompt("Enter new date (YYYY-MM-DD)");

            const note =
                prompt("Enter new note");

            const token =
                localStorage.getItem("token");

            const response =
                await fetch(
                    "/api/expenses/" + id,
                    {
                        method: "PUT",

                        headers: {
                            "Content-Type": "application/json",
                            Authorization: `Bearer ${token}`
                        },

                        body: JSON.stringify({
                            amount,
                            category,
                            date,
                            note
                        })
                    }
                );

            const data =
                await response.json();

            alert(data.message);

            loadDashboard();

        }

        async function deleteExpense(id) {

            const token =
                localStorage.getItem("token");

            const response =
                await fetch(
                    "/api/expenses/" + id,
                    {
                        method: "DELETE",

                        headers: {
                            Authorization: `Bearer ${token}`
                        }
                    }
                );

            const data =
                await response.json();

            alert(data.message);

            loadDashboard();

        }

        document
            .getElementById("logoutBtn")
            .addEventListener("click", () => {

                localStorage.removeItem("token");
                localStorage.removeItem("role");

                window.location.href =
                    "/login.html";

            });

        document
            .getElementById("adminBtn")
            .addEventListener("click", () => {

                window.location.href =
                    "/admin.html";

            });

        const role =
            localStorage.getItem("role");

        if (role !== "admin") {

            document
                .getElementById("adminBtn")
                .style.display = "none";

        }

        loadDashboard();

    </script>

</body>

</html>
