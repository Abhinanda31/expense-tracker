<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Login</h1>

    <form id="loginForm">

        <input
            type="email"
            id="email"
            placeholder="Email"
            required
        >

        <br><br>

        <input
            type="password"
            id="password"
            placeholder="Password"
            required
        >

        <br><br>

        <button type="submit">
            Login
        </button>

    </form>

    <script>

    document
      .getElementById("loginForm")
      .addEventListener("submit", async (event) => {

        event.preventDefault();

        const email =
          document.getElementById("email").value;

        const password =
          document.getElementById("password").value;

        try {

          const response = await fetch(
            "/api/auth/login",
            {
              method: "POST",

              headers: {
                "Content-Type": "application/json"
              },

              body: JSON.stringify({
                email,
                password
              })
            }
          );

          const data = await response.json();

          if (response.ok) {

            localStorage.setItem(
              "token",
              data.token
            );

            alert("Login successful");

            window.location.href =
              "/dashboard.html";

          } else {

            alert(data.message);

          }

        } catch (error) {

          alert("Something went wrong");

        }

      });

    </script>

</body>
</html>
